<!-- ADD TO <script> SECTION (before closing </script>) -->
<script>
  // ── PRESS-READINESS SCANNER ──
  let scannerData = {};

  async function runPressScanner() {
    const url = document.getElementById('scan-url').value.trim();
    if (!url) {
      document.getElementById('scan-url').focus();
      document.getElementById('scan-url').style.borderColor = 'var(--accent)';
      return;
    }

    if (!url.match(/^https?:\/\//)) {
      alert('Please enter a valid URL starting with http:// or https://');
      return;
    }

    // Track scan start
    if (window.posthog) posthog.capture('scan_started', { url });

    const btn = document.getElementById('scan-btn');
    btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
    btn.disabled = true;

    try {
      const res = await fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, action: 'scan' })
      });

      if (!res.ok) throw new Error('Scan failed');
      
      const data = await res.json();
      scannerData = { url, ...data };

      // Track scan completed
      if (window.posthog) posthog.capture('scan_completed', { url, score: data.score });

      displayScanResults(data);

    } catch (e) {
      alert('Failed to scan URL. Please check the URL and try again.');
      console.error('Scanner error:', e);
    } finally {
      btn.innerHTML = '<span>Scan my site (free)</span><span class="btn-icon">🔍</span>';
      btn.disabled = false;
    }
  }

  function displayScanResults(data) {
    const resultsEl = document.getElementById('scanner-results');
    resultsEl.style.display = 'block';

    // Animate score circle
    const score = data.score || 0;
    const percentage = (score / 100) * 360;
    document.querySelector('.score-circle').style.background = 
      `conic-gradient(var(--accent) ${percentage}deg, rgba(255,255,255,0.1) ${percentage}deg)`;
    
    // Animate score number
    animateCount(score, document.getElementById('score-display'));

    // Status text based on score
    const statusEl = document.getElementById('score-status-text');
    if (score >= 80) statusEl.textContent = 'Excellent! Ready to launch';
    else if (score >= 60) statusEl.textContent = 'Good start. A few tweaks needed';
    else if (score >= 40) statusEl.textContent = 'Needs work before going live';
    else statusEl.textContent = 'High priority: Fix these issues';

    // Breakdown bars
    const breakdown = data.breakdown || {};
    animateBar('website', breakdown.websiteQuality || 0, 35);
    animateBar('social', breakdown.socialPresence || 0, 20);
    animateBar('launch', breakdown.launchReadiness || 0, 25);
    animateBar('content', breakdown.contentSignals || 0, 20);

    // Matched contacts (blurred preview)
    const contacts = data.contacts || [];
    document.getElementById('match-count').textContent = data.totalMatches || contacts.length;
    
    const listEl = document.getElementById('matched-list');
    listEl.innerHTML = contacts.slice(0, 3).map(c => `
      <div class="matched-item">
        <span class="matched-item-name">${esc(c.name || 'Media Contact')}</span>
        <span class="matched-item-tag">${c.audience_size ? formatNum(c.audience_size) + ' reach' : 'Directory'}</span>
      </div>
    `).join('');

    resultsEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function animateBar(id, value, max) {
    const fillEl = document.getElementById(`bar-${id}`);
    const scoreEl = document.getElementById(`score-${id}`);
    const percentage = (value / max) * 100;
    
    setTimeout(() => {
      fillEl.style.width = `${percentage}%`;
    }, 100);
    
    scoreEl.textContent = `${value}/${max}`;
  }

  async function unlockReport() {
    const email = document.getElementById('unlock-email').value.trim();
    if (!email || !email.includes('@')) {
      alert('Please enter a valid email address');
      return;
    }

    // Track email capture
    if (window.posthog) {
      posthog.identify(email);
      posthog.capture('email_captured', { url: scannerData.url, score: scannerData.score });
    }

    const btn = event.target;
    btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span>';
    btn.disabled = true;

    try {
      const res = await fetch('/api/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: scannerData.url, email, action: 'unlock' })
      });

      if (!res.ok) throw new Error('Unlock failed');
      
      const data = await res.json();

      // Show full report
      document.getElementById('email-unlock').style.display = 'none';
      document.getElementById('matched-list').classList.remove('blurred');
      document.querySelector('.matched-overlay').style.display = 'none';
      document.getElementById('full-report').style.display = 'block';

      // Display suggestions
      const suggestions = data.suggestions || [];
      document.getElementById('suggestions-list').innerHTML = suggestions.map(s => 
        `<li>${esc(s)}</li>`
      ).join('');

      // Update matched list with full data
      const contacts = data.contacts || [];
      document.getElementById('matched-list').innerHTML = contacts.slice(0, 12).map(c => `
        <div class="matched-item">
          <span class="matched-item-name">${esc(c.name || 'Directory')}</span>
          <span class="matched-item-tag">${c.audience_size ? formatNum(c.audience_size) + ' reach' : 'Matched'}</span>
        </div>
      `).join('');

    } catch (e) {
      alert('Failed to unlock report. Please try again.');
      console.error('Unlock error:', e);
      btn.innerHTML = '<span>Unlock full report</span><span class="btn-icon">🔓</span>';
      btn.disabled = false;
    }
  }

  function goToCheckout() {
    // Track checkout click
    if (window.posthog) posthog.capture('checkout_clicked', { source: 'scanner', score: scannerData.score });
    
    // Redirect to step 2 (existing flow) or direct checkout
    goToStep2FromPreview();
  }

  // Keyboard shortcut for scanner
  document.getElementById('scan-url')?.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') runPressScanner();
  });
</script>
