<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0a0a0a;
    --paper: #f5f2ec;
    --warm: #f0ebe0;
    --accent: #d4521a;
    --accent-light: #f4e4d8;
    --mid: #6b6560;
    --rule: #d8d2c8;
    --mono: 'DM Mono', monospace;
    --serif: 'Instrument Serif', serif;
    --sans: 'Syne', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.02em;
    color: var(--ink);
    text-decoration: none;
  }

  .logo span { color: var(--accent); }

  .nav-links {
    display: flex;
    gap: 24px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav-links a {
    color: var(--mid);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--accent); }

  .breadcrumb {
    padding: 20px 48px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--mid);
    letter-spacing: 0.04em;
  }

  .breadcrumb a {
    color: var(--mid);
    text-decoration: none;
  }

  .breadcrumb a:hover { color: var(--accent); }

  .hero {
    padding: 48px 48px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .hero h1 {
    font-family: var(--serif);
    font-size: clamp(36px, 5vw, 56px);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }

  .hero p {
    font-size: 17px;
    color: var(--mid);
    line-height: 1.6;
  }

  .dir-list {
    padding: 40px 48px 80px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .dir-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2px;
  }

  .dir-item {
    display: block;
    background: var(--warm);
    padding: 24px 20px;
    text-decoration: none;
    transition: background 0.2s;
  }

  .dir-item:hover { background: var(--accent-light); }

  .dir-item-name {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .dir-item-desc {
    font-size: 13px;
    color: var(--mid);
    line-height: 1.5;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .dir-item-meta {
    display: flex;
    gap: 12px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--mid);
    letter-spacing: 0.04em;
  }

  footer {
    border-top: 1px solid var(--rule);
    padding: 32px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 18px;
    color: var(--ink);
  }

  .footer-logo span { color: var(--accent); }

  .footer-note {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--mid);
    letter-spacing: 0.06em;
  }

  @media (max-width: 768px) {
    nav, .breadcrumb, .hero, .dir-list, footer { padding-left: 24px; padding-right: 24px; }
    .dir-grid { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
